<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recipe Finder Dashboard</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header>
    <h1>🍽 Recipe Finder</h1>

    <input type="text" id="searchInput" placeholder="Search recipes...">

</header>

<section class="filters">

    <button onclick="filterCategory('all')">All</button>
    <button onclick="filterCategory('breakfast')">Breakfast</button>
    <button onclick="filterCategory('lunch')">Lunch</button>
    <button onclick="filterCategory('dinner')">Dinner</button>
    <button onclick="filterCategory('dessert')">Dessert</button>

</section>

<section id="recipeContainer"></section>

<!-- Modal -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span onclick="closeModal()" class="close">&times;</span>
        <h2 id="modalTitle"></h2>
        <p id="modalDesc"></p>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
